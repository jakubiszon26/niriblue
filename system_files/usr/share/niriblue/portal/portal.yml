# niriblue Portal configuration.
#
# A GUI front-end for the `ujust` recipes in
# /usr/share/niriblue/just/niriblue.just. Each action either:
#   * runs `script` directly in a kitty terminal (one-shot), or
#   * opens a modal that first runs `status_script` headlessly and then shows
#     the listed `options` (the option whose `id` matches the status string is
#     highlighted).
#
# Keep this in sync with niriblue.just when recipes are added or removed.

screens:
  - title: "System"
    actions:
      - title: "Update System"
        description: "Update everything: bootc image, Flatpaks, sysexts, Nix / home-manager."
        script: "ujust update"
      - title: "Roll Back"
        description: "Stage the previous system deployment. Reboot to apply."
        script: "ujust rollback"
      - title: "Clean Up Storage"
        description: "Prune containers, unused Flatpaks and old journal logs."
        script: "ujust clean-system"
      - title: "Device Info"
        description: "Show system and hardware info (fastfetch)."
        script: "ujust device-info"
      - title: "Reboot to BIOS / UEFI"
        description: "Reboot directly into the firmware setup screen."
        script: "ujust bios"

  - title: "Setup"
    actions:
      - title: "Home Manager (Nix dev tools)"
        description: "One-time opt-in: seed and activate per-user home-manager."
        script: "ujust setup-home-manager"
      - title: "Virtualization (libvirt / KVM)"
        description: "Add your user to libvirt/kvm and start libvirtd."
        script: "ujust setup-virtualization"
      - title: "Rootless Docker"
        description: "Initialize rootless Docker for the current user (one-time)."
        script: "ujust setup-docker-rootless"

  - title: "Apps"
    actions:
      - title: "Distrobox (userspace)"
        description: "Install distrobox into ~/.local — per-user containers, no image rebuild."
        script: "ujust install-distrobox"
      - title: "JetBrains Toolbox"
        description: "Install JetBrains Toolbox into ~/.local (userspace)."
        script: "ujust install-jetbrains-toolbox"
      - title: "DaVinci Resolve (davincibox)"
        description: "Set up DaVinci Resolve in a distrobox container. Needs the .zip in ~/Downloads."
        script: "ujust install-davincibox"
      - title: "VS Code (sysext)"
        description: "Install Visual Studio Code as a system extension."
        script: "ujust install-vscode"
      - title: "Tailscale (sysext)"
        description: "Install Tailscale (tailscaled + CLI) and enable the daemon."
        script: "ujust install-tailscale"
      - title: "NordVPN (sysext)"
        description: "Install NordVPN daemon/CLI + GUI and enable the daemon."
        script: "ujust install-nordvpn"
      - title: "Google Chrome (sysext)"
        description: "Install Google Chrome as a system extension."
        script: "ujust install-sysext google-chrome"
      - title: "Mullvad VPN (sysext)"
        description: "Install Mullvad VPN as a system extension."
        script: "ujust install-sysext mullvad-vpn"
      - title: "Bitwarden (sysext)"
        description: "Install the Bitwarden desktop app as a system extension."
        script: "ujust install-sysext bitwarden"
      - title: "1Password (sysext)"
        description: "Install the 1Password desktop app as a system extension."
        script: "ujust install-sysext 1password-gui"
      - title: "1Password CLI (sysext)"
        description: "Install the 1Password CLI (op) as a system extension."
        script: "ujust install-sysext 1password-cli"

  - title: "AI"
    actions:
      - id: "ollama"
        title: "Ollama (AMD ROCm)"
        description: "Run Ollama in Docker on the GPU. Requires rootless Docker first."
        status_script: |
          if docker ps --format '{{.Names}}' 2>/dev/null | grep -qx ollama; then
            echo remove
          else
            echo setup
          fi
        options:
          - id: "setup"
            label: "Install / Start Ollama"
            script: "ujust setup-ollama"
          - id: "remove"
            label: "Remove Ollama"
            script: "ujust remove-ollama"

  - title: "Gaming"
    actions:
      - title: "Fix Proton / Wine Hang"
        description: "Kill stuck wine/proton processes."
        script: "ujust fix-proton-hang"
